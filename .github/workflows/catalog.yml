name: Build 4pda catalog
run-name: >-
  📚 Каталог 4pda — ${{ github.event.inputs.mode == 'fast' && 'быстрое обновление' || (github.event.schedule == '0 * * * *' && 'быстрое обновление' || 'полный сбор') }}${{ github.event_name == 'schedule' && ' (по расписанию)' || (github.event_name == 'workflow_dispatch' && ' (вручную)' || ' (после коммита)') }}

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Режим обхода'
        required: false
        default: 'full'
        type: choice
        options: [full, fast]

permissions:
  contents: write             # разрешаем коммитить catalog.json
  actions: write              # разрешаем самозапуск следующего прогона

concurrency:
  group: catalog
  cancel-in-progress: false

jobs:
  build-catalog:
    runs-on: ubuntu-latest
    timeout-minutes: 320
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright + Chromium
        run: |
          npm init -y >/dev/null 2>&1 || true
          npm i playwright@1.47.2 >/dev/null 2>&1
          npx playwright install --with-deps chromium

      - name: Write crawler
        run: |
          cat > crawl.mjs << 'CRAWLER'
          import { chromium } from 'playwright';
          import fs from 'fs';
          import { execSync } from 'child_process';
          import zlib from 'zlib';

          // сохраняем catalog.json и коммитим в репозиторий ПО ХОДУ (realtime) — чтобы обрыв не стёр прогресс
          let committing = false;
          // в отдаваемый файл кладём только то, что нужно приложению для связи и поиска: t, n, f, pkg, v (+ e для памяти робота). d/ic не храним — тянутся на лету.
          function slim(mapRef) { return Object.values(mapRef).map(a => { const o = { t: a.t, n: a.n, f: a.f, e: a.e }; if (a.pkg) o.pkg = a.pkg; if (a.v) o.v = a.v; return o; }); }
          function saveAndCommit(label, mapRef) {
            const apps = slim(mapRef);
            const out = { updated: new Date().toISOString(), version: Date.now(), count: apps.length, apps };
            try { fs.writeFileSync('catalog.json', JSON.stringify(out)); } catch (e) { return; }
            if (committing) return; committing = true;
            try {
              execSync('git add catalog.json', { stdio: 'ignore' });
              execSync('git diff --cached --quiet || git commit -m "catalog: ' + apps.length + ' apps (' + label + ')"', { stdio: 'ignore', shell: '/bin/bash' });
              try { execSync('git push', { stdio: 'ignore' }); } catch { execSync('git pull --rebase -X ours && git push', { stdio: 'ignore', shell: '/bin/bash' }); }
              console.log('  >> сохранено в репо: ' + apps.length + ' тем (' + label + ')');
            } catch (e) { console.log('  >> коммит не прошёл: ' + e.message); }
            committing = false;
          }

          // Каталоги 4pda в том порядке, как на сайте (forumId: подпись)
          const FORUMS = [
            [212,  'Android - Программы'],
            [1109, 'Архив программ'],
            [213,  'Android - игры'],
            [550,  'Создание программ и игр под Android'],
            [284,  'Архив раздела (разработка)'],
            [1198, 'Для мобильных устройств'],
            [94,   'Навигация - Программы'],
            [529,  'Эмуляторы для Android'],
            [1241, 'Программы и сервисы ИИ (нейросети)'],
          ];
          const JUNK = /^(тема|последн|ответ|цитата|показать|скрыт|прикреплено|важно|опрос|правила|каталог|дайджест|поиск|набор|подписаться|новости из мира|обсуждение новост|стр\.?|FAQ|обзоры|вопросы и предложения|важные объявления|помощь в поиске|установка игр|игровые социальные|новости игр|новости раздела|заявки на|обсуждение анонсов|10 заповедей|программы$|как правильно|карма|скачивание с сайта|редактирование|не загружается|общие вопросы|общий faq|часто задаваем|разработчики и google|скрипты на shell|общие принципы|мои программы|обзоры игр|глоссар|droidfish|android - глоссарий|»)/i;
          // разделы-мусор (НЕ из каталогов пользователя): iOS, форумная мета, железо телефонов/консолей, порт на др.ОС, dev-обсуждения
          const DROP_F = new Set(['373','813','141','142','4','283','140','635','139','645','887','279','93','763','442','144','203','103','48','295','281','1192','214','910','380','551','1143','1158']);

          // грузим прошлый catalog.json (инкрементально дополняем) и СРАЗУ чистим его от мусора
          let prev = { apps: [] };
          try { prev = JSON.parse(fs.readFileSync('catalog.json', 'utf8')); } catch {}
          const map = {};
          const PKG_OK = /^[a-zA-Z][a-zA-Z0-9_]*(\.[a-zA-Z0-9_]+)+$/; // валидный вид пакета: сегменты через точку, латиница/цифры/подчёркивание
          let cleanedPkg = 0;
          for (const a of (prev.apps || [])) {
            if (!a || !a.t) continue;
            if (DROP_F.has(String(a.f))) continue;
            const nm = (a.n || '').trim();
            if (nm.length < 2 || /^[\d#]+$/.test(nm) || JUNK.test(nm)) continue;
            if (a.pkg && (!PKG_OK.test(a.pkg) || a.pkg.length > 60 || /^\d/.test(a.pkg))) { delete a.pkg; cleanedPkg++; } // мусорный пакет — убираем, тема переобработается
            map[a.t] = a;
          }
          if (cleanedPkg) console.log('вычищено мусорных пакетов:', cleanedPkg);
          console.log('загружено из старого catalog.json после чистки:', Object.keys(map).length);
          const MODE = process.env.MODE === 'fast' ? 'fast' : 'full';
          const FAST_PAGES = 3; // быстрый режим: только первые страницы (свежее)
          const oldVersion = prev.version || 0;
          const oldMap = {}; for (const t in map) oldMap[t] = { n: map[t].n, f: map[t].f };
          const freshSeen = new Set(); // темы, встреченные на свежих страницах этого прогона (всплыли = обновились)

          const UA = 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36';
          // FPDA_COOKIE может быть в формате "<user-agent>|||<куки>" (экспорт из приложения) — тогда UA берём тот же, что в приложении, чтобы cf_clearance подошла
          const RAW_ENV = (process.env.FPDA_COOKIE || '').trim();
          let UA_OVERRIDE = '', RAW_COOKIE = RAW_ENV;
          { const s = RAW_ENV.indexOf('|||'); if (s >= 0) { UA_OVERRIDE = RAW_ENV.slice(0, s).trim(); RAW_COOKIE = RAW_ENV.slice(s + 3).trim(); } }
          if (UA_OVERRIDE) console.log('UA из приложения подставлен');
          const browser = await chromium.launch({ headless: true, proxy: { server: 'socks5://127.0.0.1:40000' } });
          const ctx = await browser.newContext({
            userAgent: UA_OVERRIDE || UA,
            locale: 'ru-RU',
            viewport: { width: 1366, height: 900 },
          });
          // куки залогиненной сессии 4pda (+ cf_clearance) из секрета FPDA_COOKIE
          let HAVE_COOKIE = false;
          if (RAW_COOKIE) {
            const cookies = RAW_COOKIE.split(';').map(s => s.trim()).filter(Boolean).map(pair => { const i = pair.indexOf('='); if (i < 0) return null; return { name: pair.slice(0, i).trim(), value: pair.slice(i + 1).trim(), domain: '.4pda.to', path: '/' }; }).filter(Boolean);
            try { await ctx.addCookies(cookies); HAVE_COOKIE = cookies.some(c => c.name === 'member_id'); console.log('4pda-сессия: подставлено куки ' + cookies.length + (cookies.some(c => c.name === 'cf_clearance') ? ' (cf_clearance ЕСТЬ)' : ' (cf_clearance НЕТ!)')); } catch (e) { console.log('куки не подставились: ' + e.message); }
          } else { console.log('FPDA_COOKIE пуст'); }
          const page = await ctx.newPage();

          // список раздела тянем СЫРЫМ HTTP через WARP: сервер отдаёт классическую вёрстку с data-topic, а браузер — другую, без data-topic
          async function fetchHtml(url) {
            try {
              const resp = await ctx.request.get(url, { headers: { 'User-Agent': UA, 'Accept': 'text/html,*/*', 'Referer': 'https://4pda.to/forum/' }, maxRedirects: 6, timeout: 60000, failOnStatusCode: false });
              const buf = Buffer.from(await resp.body());
              try { return new TextDecoder('windows-1251').decode(buf); } catch { return buf.toString('utf8'); }
            } catch { return ''; }
          }

          async function open(url) {
            for (let attempt = 0; attempt < 3; attempt++) {
              try {
                await page.goto(url, { waitUntil: 'domcontentloaded', timeout: 60000 });
                // ждём, пока Cloudflare-заставка сама пройдёт (реальный движок её решает)
                const CF = /Just a moment|Attention Required|Проверка браузера|Один момент|Всё в порядке, но|challenge-platform|_cf_chl|cf-chl|cdn-cgi\/challenge/i;
                for (let i = 0; i < 16; i++) {
                  const t = await page.title().catch(() => '');
                  const html = await page.content().catch(() => '');
                  if (!CF.test(t + html)) return html;
                  await page.waitForTimeout(2500);
                  await page.waitForLoadState('domcontentloaded').catch(() => {});
                }
                console.log('!!! Cloudflare НЕ пройден на ' + url + ' — обнови куку (нужен cf_clearance) в секрете FPDA_COOKIE');
                return await page.content();
              } catch { await page.waitForTimeout(2000); }
            }
            return '';
          }

          // извлечь из шапки темы: пакет, версию, краткое описание, иконку
          async function extractHat(topicId) {
            const html = await fetchHtml('https://4pda.to/forum/index.php?showtopic=' + topicId);
            if (!html || html.length < 400) return null;
            // ПАКЕТ — по всему HTML (как в приложении): текст «Имя пакета», ссылка Google Play, market
            let pkg = '';
            const PKG = "([a-zA-Z][a-zA-Z0-9_]*(?:\\.[a-zA-Z0-9_]+){1,})";
            let m = html.match(new RegExp("Имя\\s*пакета[\\s\\S]{0,40}?" + PKG, "i"))
                 || html.match(new RegExp("Название\\s*пакета[\\s\\S]{0,40}?" + PKG, "i"))
                 || html.match(new RegExp("Пакет\\s*[:\uFF1A]\\s*" + PKG, "i"))
                 || html.match(new RegExp("ID\\s*приложения[\\s\\S]{0,20}?" + PKG, "i"))
                 || html.match(new RegExp("package\\s*name[\\s\\S]{0,40}?" + PKG, "i"))
                 || html.match(new RegExp("packageName['\":\\s]{0,8}" + PKG, "i"));
            if (m) pkg = m[1];
            // фолбэк: пакет из ссылки Google Play / market в теме (если пакет ещё не найден)
            if (!pkg) { m = html.match(/play\.google\.com[^"'<>\s]*?id(?:=|%3D|%3d)([a-zA-Z0-9._]+)/i); if (m) pkg = m[1]; }
            if (!pkg) { m = html.match(/market(?::|%3A|%3a)[^"'<>\s]*?id(?:=|%3D|%3d)([a-zA-Z0-9._]+)/i); if (m) pkg = m[1]; }
            if (!pkg) { m = html.match(/details%3Fid%3D([a-zA-Z0-9._]+)/i) || html.match(/details\?id=([a-zA-Z0-9._]+)/i); if (m) pkg = m[1]; }
            // прочие магазины: пакет прямо в URL
            const PK = "([a-zA-Z][a-zA-Z0-9_]*(?:\\.[a-zA-Z0-9_]+)+)";
            if (!pkg) { m = html.match(new RegExp("apps\\.rustore\\.ru/(?:app|catalog/app)/" + PK, "i")); if (m) pkg = m[1]; }                 // RuStore
            if (!pkg) { m = html.match(new RegExp("(?:galaxystore|apps)\\.samsung\\.com/[^\"'<>\\s]*?(?:detail/|appId=)" + PK, "i")); if (m) pkg = m[1]; } // Galaxy Store
            if (!pkg) { m = html.match(new RegExp("f-droid\\.org/(?:[a-z]{2}/)?packages/" + PK, "i")); if (m) pkg = m[1]; }                        // F-Droid
            if (!pkg) { m = html.match(new RegExp("amazon\\.[a-z.]+/[^\"'<>\\s]*?[?&]p=" + PK, "i")); if (m) pkg = m[1]; }                          // Amazon Appstore
            if (!pkg) { m = html.match(new RegExp("[?&]id=" + PK + "(?:[&\"'<\\s]|$)", "i")); if (m) pkg = m[1]; }                                 // любой store-URL вида ?id=пакет
            // версия — из текста шапки (регуляркой по HTML)
            let v = ''; const vm = html.match(/(?:Текущая версия|Версия|Version)\s*[:\uFF1A]?\s*(?:<[^>]*>\s*)*([^<\n\r|]{1,40})/i); if (vm) v = vm[1].replace(/&nbsp;|&#160;/g, ' ').replace(/\s+/g, ' ').trim();
            return { pkg, v };
          }

          let total = 0;
          const doneForums = new Set();
          const queue = FORUMS.map(([id, name]) => ({ id: String(id), name, depth: 0 }));
          // подстраховка: подразделы раздела 212 — там лежат сами приложения (вытащены из живой страницы). на случай, если авто-определение подразделов не сработает
          const SEED_SUBS = ['285','315','316','317','318','319','320','321','509','558','634','751','794','811','831','832','1129','1130','1131','1144','1157'];
          for (const s of SEED_SUBS) { if (!DROP_F.has(s) && !queue.find(q => q.id === s)) queue.push({ id: s, name: '(подраздел 212)', depth: 1 }); }
          let processed = 0;
          let DBG_DONE = false; // отладка: выгрузить реальную страницу робота один раз
          while (queue.length && processed < 120) {
            const { id: fid, name: fname, depth } = queue.shift();
            if (doneForums.has(fid)) continue;
            doneForums.add(fid);
            if (DROP_F.has(fid)) { console.log(`forum ${fid} пропущен (не из каталогов)`); continue; }
            processed++;
            let emptyStreak = 0, noNew = 0;
            const seenSigs = new Set();
            for (let st = 0; st <= 40000; st += 30) {
              if (MODE === 'fast' && st / 30 >= FAST_PAGES) break; // быстрый режим — только свежие страницы
              const url = `https://4pda.to/forum/index.php?showforum=${fid}&sort_key=last_post&sort_by=Z-A&prune_day=1000&topicfilter=all&st=${st}`;
              const html = await fetchHtml(url);
              if (st === 0 && !DBG_DONE) { DBG_DONE = true; console.log('  раздел ' + fid + ' стр.0: html ' + (html || '').length + ' симв, data-topic=' + (((html || '').match(/data-topic/g) || []).length) + ', f-NNN=' + (((html || '').match(/id="f-\d+/g) || []).length)); }
              if (!html) { if (++emptyStreak >= 3) break; else continue; }
              emptyStreak = 0;
              // подразделы: 4pda перешёл на SEO-ссылки, id раздела теперь в атрибуте id="f-NNN"
              if (st === 0) {
                const subs = [...new Set([...html.matchAll(/id="f-(\d+)"/g)].map(m => m[1]))];
                let added = 0;
                for (const s of subs) { if (doneForums.size + queue.length > 800) break; if (s && !DROP_F.has(s) && !doneForums.has(s) && !queue.find(q => q.id === s)) { queue.push({ id: s, name: '', depth: depth + 1 }); added++; } }
                console.log(`  раздел ${fid} (гл.${depth}): подразделов на стр. ${subs.length}, добавлено ${added}`);
              }
              // темы: разбиваем на строки по data-topic, из каждой берём id, название и дату последнего поста
              const links = [];
              for (const rp of html.split(/<div data-topic="/).slice(1)) {
                const idm = rp.match(/^(\d+)"/); if (!idm) continue;
                const tm = rp.match(/class="[^"]*\btopic_title\b[^"]*"[^>]*>[\s\S]*?<a\b[^>]*>([\s\S]*?)<\/a>/); if (!tm) continue;
                const txt = tm[1].replace(/<[^>]+>/g, '').replace(/&nbsp;|&#160;/g, ' ').replace(/&amp;/g, '&').replace(/&quot;/g, '"').replace(/&#0?39;|&apos;/g, "'").replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/\s+/g, ' ').trim();
                links.push({ id: idm[1], text: txt });
              }
              const ids = links.map(l => l.id).filter(Boolean);
              const sig = ids.slice().sort().join(',');
              if (st > 0 && (!ids.length || seenSigs.has(sig))) { console.log(`  forum ${fid}: страницы кончились на стр. ${st / 30}`); break; } // пусто или повтор (4pda мог игнорировать st) — стоп
              seenSigs.add(sig);
              let found = 0, any = 0;
              for (const l of links) {
                const tid = l.id; if (!tid) continue;
                any++;
                let name = (l.text || '').replace(/\s+/g, ' ').trim();
                if (name.length < 2 || /^[\d#]+$/.test(name) || JUNK.test(name)) continue;
                if (/\[(ios|iphone|ipad|ipados|wp7|wp8|wp10|wp|windows phone|symbian|java|bada|blackberry|bb10?|tizen|kaios|maemo|meego)\]/i.test(name)) continue; // не-Android — не берём
                freshSeen.add(tid);                                   // тема встречена на свежих страницах (могла обновиться)
                if (!map[tid]) { map[tid] = { t: tid, n: name, f: fid }; found++; }
                else if (map[tid].n !== name) { map[tid].n = name; }  // название изменилось — обновляем
              }
              if (any === 0) { if (++emptyStreak >= 2) break; }
              else if (found === 0) { if (++noNew >= 8) break; } else noNew = 0;
              if ((st / 30) % 10 === 0) console.log(`  forum ${fid}: page ${st / 30}, тем на стр. ${any} (новых ${found}), total ${Object.keys(map).length}`);
              if ((st / 30) % 150 === 149) saveAndCommit(`forum ${fid} стр.${st / 30}`, map); // сохраняем по ходу
              await new Promise(r => setTimeout(r, 120));
            }
            total = Object.keys(map).length;
            console.log(`forum ${fid} (${fname}) done [${processed}/${doneForums.size + queue.length}], total in catalog: ${total}`);
            saveAndCommit(`после раздела ${fid}`, map); // сохраняем после каждого раздела
          }

          // === Обогащение шапок (пакет/версия/описание/иконка) — партиями за прогон ===
          {
            const EV = 8; // переобработка: добавлены источники пакета (RuStore/Galaxy/F-Droid/Amazon/любой ?id=)
            const CAP = MODE === 'fast' ? 800 : 6000;
            const BUDGET = 1000 * 60 * (MODE === 'fast' ? 8 : 200);
            const t0 = Date.now();
            let cand = Object.values(map).filter(a => a.e !== EV || (freshSeen.has(a.t) && a.pkg));   // не обогащённые + всплывшие темы (перечитать версию); версию без надобности не долбим — приложение берёт её живьём
            cand.sort((a, b) => (+b.t) - (+a.t));                    // новые (больший id) — первыми
            cand = cand.slice(0, CAP);
            let en = 0;
            for (const a of cand) {
              if (Date.now() - t0 > BUDGET) { console.log('лимит времени обогащения'); break; }
              const h = await extractHat(a.t);
              if (h) { if (h.pkg) a.pkg = h.pkg; if (h.v) a.v = h.v; a.e = EV; } // d/ic не храним — только привязка и версия; описание/иконка тянутся в приложении на лету
              en++;
              if (en % 100 === 0) { console.log('обогащено шапок: ' + en + '/' + cand.length + ' (всего с пакетом: ' + Object.values(map).filter(x => x.pkg).length + ')'); saveAndCommit('обогащение ' + en, map); }
              await new Promise(r => setTimeout(r, 120));
            }
            console.log('обогащено за прогон: ' + en + ', с пакетом всего: ' + Object.values(map).filter(x => x.pkg).length);
            // остались ли необогащённые — для самозапуска следующего прогона (только полный режим)
            const remaining = Object.values(map).filter(a => a.e !== EV).length;
            console.log('осталось необогащённых: ' + remaining);
            if (MODE === 'full' && remaining > 0 && en > 0) { try { fs.writeFileSync('.need_more', String(remaining)); } catch {} }
          }

          await browser.close();

          const newVersion = Date.now();
          // вычистить не-Android темы, просочившиеся раньше (iOS/WP/Symbian и т.п.)
          const NA_RE = /\[(ios|iphone|ipad|ipados|wp7|wp8|wp10|wp|windows phone|symbian|java|bada|blackberry|bb10?|tizen|kaios|maemo|meego)\]/i;
          for (const k of Object.keys(map)) { if (NA_RE.test(map[k].n || '')) delete map[k]; }
          const apps = slim(map);
          // отдаём только связь+поиск: t, n, f, pkg, v (+ e). Описание/иконка в файле не хранятся — приложение тянет их для видимых карточек.
          fs.writeFileSync('catalog.json', JSON.stringify({ updated: new Date().toISOString(), version: newVersion, count: apps.length, withPkg: apps.filter(a => a.pkg).length, apps }));
          // лишние файлы больше не нужны — удаляем из репозитория
          for (const f of ['version.json', 'versions.json', 'changes.json']) { try { fs.unlinkSync(f); } catch {} }
          try { execSync('git rm -f --ignore-unmatch version.json versions.json changes.json', { stdio: 'ignore' }); } catch {}
          console.log(`ГОТОВО [${MODE}]: всего ${apps.length}, с пакетом ${apps.filter(a => a.pkg).length}`);
          // финальный коммит
          try {
            execSync('git add catalog.json', { stdio: 'ignore' });
            execSync('git diff --cached --quiet || git commit -m "catalog ' + MODE + ': ' + apps.length + ' тем, ' + apps.filter(a => a.pkg).length + ' с пакетом"', { stdio: 'ignore', shell: '/bin/bash' });
            try { execSync('git push', { stdio: 'ignore' }); } catch { execSync('git pull --rebase -X ours && git push', { stdio: 'ignore', shell: '/bin/bash' }); }
            console.log('запушено');
          } catch (e) { console.log('финальный коммит не прошёл:', e.message); }
          CRAWLER

      - name: Setup Cloudflare WARP (SOCKS-прокси на 127.0.0.1:40000)
        run: |
          set +e
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor -o /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update
          sudo apt-get install -y cloudflare-warp
          # запускаем демон WARP
          sudo systemctl enable --now warp-svc 2>/dev/null || (sudo nohup warp-svc >/tmp/warp-svc.log 2>&1 &)
          sleep 6
          # регистрация (синтаксис отличается по версиям CLI — пробуем оба)
          warp-cli --accept-tos registration new || warp-cli --accept-tos register || true
          # режим прокси: SOCKS5 на 127.0.0.1:40000
          warp-cli --accept-tos mode proxy || warp-cli --accept-tos set-mode proxy || true
          warp-cli --accept-tos proxy port 40000 || true
          warp-cli --accept-tos connect || warp-cli --accept-tos enable || true
          sleep 10
          warp-cli --accept-tos status || true
          echo "--- проверка: идём через WARP? (ждём warp=on) ---"
          curl -s --max-time 20 --socks5 127.0.0.1:40000 https://www.cloudflare.com/cdn-cgi/trace || echo "trace через WARP-прокси не ответил"

      - name: Run crawler
        env:
          MODE: ${{ github.event.inputs.mode || (github.event.schedule == '0 * * * *' && 'fast' || 'full') }}
          FPDA_COOKIE: ${{ secrets.FPDA_COOKIE }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "Режим: $MODE"
          node crawl.mjs

      - name: Commit (safety net)
        if: always()
        run: |
          rm -f crawl.mjs package.json package-lock.json
          rm -rf node_modules
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add catalog.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "нет изменений для коммита"
          else
            git commit -m "catalog update ($(date -u +%Y-%m-%d))"
            git push || (git pull --rebase -X ours && git push)
          fi

      - name: Продолжить, если база ещё не обогащена полностью
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f .need_more ]; then
            echo "Осталось необогащённых: $(cat .need_more) — запускаю следующий прогон"
            sleep 10
            curl -sf -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/actions/workflows/catalog.yml/dispatches" \
              -d '{"ref":"main","inputs":{"mode":"full"}}' && echo "Следующий прогон запущен" || echo "Не удалось запустить следующий прогон"
          else
            echo "База обогащена полностью — самозапуск не нужен"
          fi
