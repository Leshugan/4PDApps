name: Build Android APK
run-name: "🔨 Сборка APK Notenger"

on:
  push:
    branches: [ main, master ]
    paths:
      - '*.zip'
      - '.github/workflows/build.yml'
  workflow_dispatch:

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Распаковать архив проекта
        run: |
          set -e
          ARCH=$(ls *.zip 2>/dev/null | head -1)
          if [ -z "$ARCH" ]; then
            echo "::error::Не найден архив проекта (*.zip) в корне репозитория"; exit 1
          fi
          echo "Распаковываю $ARCH"
          unzip -o -q "$ARCH" -d _extracted
          INNER=$(find _extracted -maxdepth 1 -mindepth 1 -type d | head -1)
          if [ -n "$INNER" ] && [ -f "$INNER/package.json" ]; then SRC="$INNER"; else SRC=_extracted; fi
          shopt -s dotglob
          for item in "$SRC"/*; do
            name=$(basename "$item")
            [ "$name" = ".github" ] && continue
            rm -rf "./$name"
            cp -r "$item" "./$name"
          done
          shopt -u dotglob
          rm -rf _extracted
          rm -f "$ARCH"
          echo "=== корень после распаковки ===" && ls -la

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Кэш npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Кэш Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Установить зависимости
        run: npm install --legacy-peer-deps

      - name: Собрать веб-приложение
        run: npm run build

      - name: Добавить Android-проект (Capacitor)
        run: |
          set -e
          rm -rf android
          rm -f capacitor.config.ts
          npx cap add android
          npx cap copy android
          {
            echo "org.gradle.caching=true"
            echo "org.gradle.parallel=true"
            echo "org.gradle.configureondemand=true"
            echo "org.gradle.jvmargs=-Xmx3072m -Dfile.encoding=UTF-8"
          } >> android/gradle.properties

      - name: Сгенерировать иконки приложения
        run: |
          set -e
          npx @capacitor/assets generate --android --assetPath resources
          echo "=== иконки ===" && ls android/app/src/main/res/mipmap-xxxhdpi/

      - name: Прописать разрешения и версию
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          PERMS='<uses-permission android:name="android.permission.RECORD_AUDIO"/>\n    <uses-permission android:name="android.permission.CAMERA"/>\n    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES"/>\n    <uses-permission android:name="android.permission.READ_MEDIA_VIDEO"/>\n    <uses-permission android:name="android.permission.READ_MEDIA_AUDIO"/>\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"/>\n    <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE"/>\n    <uses-permission android:name="android.permission.VIBRATE"/>'
          if ! grep -q "RECORD_AUDIO" "$MANIFEST"; then
            sed -i "s|<application|$PERMS\n    <application|" "$MANIFEST"
          fi
          GRADLE=android/app/build.gradle
          sed -i 's/versionCode .*/versionCode 2/' "$GRADLE"
          sed -i 's/versionName .*/versionName "0.2"/' "$GRADLE"
          sed -i -E 's/applicationId[[:space:]]*=?[[:space:]]*"[^"]*"/applicationId "leshugan.notenger"/' "$GRADLE"
          sed -i -E 's/namespace[[:space:]]*=?[[:space:]]*"[^"]*"/namespace "leshugan.notenger"/' "$GRADLE"
          echo "=== build.gradle (id) ==="; grep -E "applicationId|namespace" "$GRADLE"
          if ! grep -q "leshugan.notenger" "$GRADLE"; then echo "::error::appId не установлен!"; exit 1; fi
          if ! grep -q "play-services-auth" "$GRADLE"; then
            sed -i 's|dependencies {|dependencies {\n    implementation "com.google.android.gms:play-services-auth:21.2.0"|' "$GRADLE"
          fi
          RESXML=android/app/src/main/res/xml
          mkdir -p "$RESXML"
          cp native/file_paths.xml "$RESXML/file_paths.xml"
          if ! grep -q "fileprovider" "$MANIFEST"; then
            PROVIDER='<provider android:name="androidx.core.content.FileProvider" android:authorities="leshugan.notenger.fileprovider" android:exported="false" android:grantUriPermissions="true">\n        <meta-data android:name="android.support.FILE_PROVIDER_PATHS" android:resource="@xml/file_paths"/>\n      </provider>'
            sed -i "s|</application>|    $PROVIDER\n    </application>|" "$MANIFEST"
          fi

      - name: Установить нативный код (MainActivity + мосты)
        run: |
          set -e
          MA=$(find android/app/src/main/java -name "MainActivity.java" | head -1)
          PKG=$(grep -m1 '^package' "$MA" | sed 's/package //;s/;//')
          echo "Пакет: $PKG"
          sed "s/__PKG__/$PKG/" native/MainActivity.java > "$MA"
          echo "=== MainActivity установлен ===" && head -5 "$MA"

      - name: Подготовить ключ подписи
        run: |
          set -e
          if [ ! -f notenger.keystore.b64 ]; then
            echo "::error::нет файла notenger.keystore.b64 в архиве проекта"; exit 1
          fi
          base64 -d notenger.keystore.b64 > android/app/notenger.keystore
          echo "keystore готов"

      - name: Собрать подписанный APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --build-cache \
            -Pandroid.injected.signing.store.file="$GITHUB_WORKSPACE/android/app/notenger.keystore" \
            -Pandroid.injected.signing.store.password="android" \
            -Pandroid.injected.signing.key.alias="androiddebugkey" \
            -Pandroid.injected.signing.key.password="android"

      - name: Загрузить готовый APK (артефакт)
        id: upload_artifact
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: Notenger_Compiled
          path: android/app/build/outputs/apk/release/*.apk

      - name: Выложить APK в релиз (квота артефактов исчерпана)
        if: steps.upload_artifact.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          APK=$(ls android/app/build/outputs/apk/release/*.apk | head -1)
          TAG=apk-latest
          NOTES="Автосборка #${{ github.run_number }} от $(date -u +'%Y-%m-%d %H:%M UTC') — выложено в релиз, т.к. квота артефактов исчерпана."
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release edit "$TAG" --repo "$REPO" --notes "$NOTES"
          else
            gh release create "$TAG" --repo "$REPO" --title "Notenger APK" --notes "$NOTES"
          fi
          gh release upload "$TAG" "$APK" --repo "$REPO" --clobber
          echo "::notice::Квота артефактов исчерпана — APK в релизе $TAG"

  cleanup:
    needs: build
    if: success()
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Удалить старые запуски и APK (оставить 10 последних)
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          WF=build.yml
          KEEP=$(gh run list --repo "$REPO" --workflow "$WF" --status success --limit 10 --json databaseId --jq '.[].databaseId')
          echo "Оставляем: $KEEP"
          gh run list --repo "$REPO" --workflow "$WF" --limit 300 --json databaseId --jq '.[].databaseId' | while read -r id; do
            [ "$id" = "$GITHUB_RUN_ID" ] && continue
            if ! printf '%s\n' "$KEEP" | grep -qx "$id"; then
              gh api -X DELETE "repos/$REPO/actions/runs/$id" >/dev/null 2>&1 && echo "удалён $id" || true
            fi
          done
