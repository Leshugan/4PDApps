name: Build APK
run-name: "🔨 Сборка APK 4PDApps"

on:
  push:
    branches: [main]
    paths:                          # собирать APK только когда меняется сам проект,
      - 'Project_4PDApps.zip'       # а не catalog.json/versions.json/catalog.yml
      - '.github/workflows/build.yml'
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Распаковать архив проекта в корень
        run: |
          set -e
          # В корне репозитория лежит только этот workflow + Project_4PDApps.zip.
          if [ ! -f Project_4PDApps.zip ]; then
            echo "ОШИБКА: нет Project_4PDApps.zip в корне репозитория."; exit 1
          fi
          unzip -o -q Project_4PDApps.zip -d _extracted
          if [ -d _extracted/Project_4PDApps ]; then SRC=_extracted/Project_4PDApps; else SRC=_extracted; fi
          shopt -s dotglob
          for item in "$SRC"/*; do
            name=$(basename "$item")
            [ "$name" = ".github" ] && continue
            rm -rf "./$name"
            cp -r "$item" "./$name"
          done
          shopt -u dotglob
          rm -rf _extracted
          rm -f Project_4PDApps.zip
          echo "=== корень после распаковки ===" && ls -la

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Кэш Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Install dependencies
        run: npm install

      - name: Build web
        run: npm run build

      - name: Add Android platform
        run: |
          rm -rf android            # снести старую платформу — иначе cap add пропустит свежую сборку
          rm -f capacitor.config.ts # в архиве только JSON-конфиг
          npx cap add android
          npx cap copy android      # принудительно скопировать свежий web-бандл (dist) в ассеты
          {
            echo "org.gradle.caching=true"
            echo "org.gradle.parallel=true"
            echo "org.gradle.configureondemand=true"
            echo "org.gradle.jvmargs=-Xmx3072m -Dfile.encoding=UTF-8"
          } >> android/gradle.properties
          # Kotlin plugin (код Google Play API из gplayapi — на Kotlin)
          sed -i "s#classpath 'com.android.tools.build:gradle.*#&\n        classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:2.1.21'#" android/build.gradle
          sed -i "s#apply plugin: 'com.android.application'#apply plugin: 'com.android.application'\napply plugin: 'kotlin-android'#" android/app/build.gradle
          # зависимости: gplayapi (Maven Central) + gson + okhttp + coroutines
          sed -i 's#dependencies {#dependencies {\n    implementation "com.auroraoss:gplayapi:3.5.8"\n    implementation "com.google.code.gson:gson:2.10.1"\n    implementation "com.squareup.okhttp3:okhttp:4.12.0"\n    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.8.1"#' android/app/build.gradle
          # JVM target Kotlin = 17 (как у Java в Capacitor)
          printf '\nandroid.kotlinOptions.jvmTarget = "17"\n' >> android/app/build.gradle
          # Версия приложения (Capacitor по умолчанию ставит 1.0/1 — переопределяем)
          APP_VER="1.001"
          APP_CODE="$(echo "$APP_VER" | tr -d '.')"
          sed -i "s/versionName \"[^\"]*\"/versionName \"$APP_VER\"/" android/app/build.gradle
          sed -i "s/versionCode [0-9][0-9]*/versionCode $APP_CODE/" android/app/build.gradle
          echo "----- версия -----" && grep -E "versionName|versionCode" android/app/build.gradle
          echo "----- deps -----" && grep -E "gplayapi|okhttp|coroutines|kotlin-gradle|kotlin-android" android/build.gradle android/app/build.gradle || true

      - name: Generate app icons
        run: |
          # Рендерим icon.svg в icon.png через sharp, затем генерим наборы иконок
          if [ -f resources/icon.svg ]; then
            npm i -g sharp-cli >/dev/null 2>&1 || npm i sharp >/dev/null 2>&1 || true
            node -e "const s=require('sharp');s('resources/icon.svg',{density:300}).resize(1024,1024).png().toFile('resources/icon.png').then(()=>console.log('svg->png ok')).catch(e=>{console.log('render skip:',e.message)})" || echo "sharp render skipped"
          fi
          npx @capacitor/assets generate --android --assetPath resources

      - name: Add Android permissions
        run: |
          MAN=android/app/src/main/AndroidManifest.xml
          if ! grep -q "QUERY_ALL_PACKAGES" "$MAN"; then
            sed -i 's#<application#<uses-permission android:name="android.permission.QUERY_ALL_PACKAGES" />\n    <uses-permission android:name="android.permission.REQUEST_INSTALL_PACKAGES" />\n    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\n\n    <application#' "$MAN"
          fi
          # запись в общее хранилище (стар. Android) + доступ ко всем файлам (Android 11+) + фоновая служба загрузок
          if ! grep -q "WRITE_EXTERNAL_STORAGE" "$MAN"; then
            sed -i 's#<application#<uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="29" />\n    <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />\n    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />\n    <uses-permission android:name="android.permission.READ_MEDIA_VIDEO" />\n    <uses-permission android:name="android.permission.READ_MEDIA_AUDIO" />\n\n    <application#' "$MAN"
          fi
          # legacy-доступ к файлам (для списка «Загрузок» на Android 10)
          sed -i 's#<application #<application android:requestLegacyExternalStorage="true" #' "$MAN"
          # старый back-callback, чтобы кнопка/жест «Назад» доходили до приложения
          sed -i 's#<application #<application android:enableOnBackInvokedCallback="false" #' "$MAN"
          # экран 4pda внутри приложения (WebView)
          if ! grep -q "leshugan.a4pda.WebViewActivity" "$MAN"; then
            sed -i 's#</application>#    <activity android:name="leshugan.a4pda.WebViewActivity" android:configChanges="keyboardHidden|orientation|screenSize" android:exported="false" />\n    </application>#' "$MAN"
          fi
          echo "----- manifest -----"
          grep -E "uses-permission|enableOnBackInvokedCallback|WebViewActivity" "$MAN" || true

      - name: Install native Apps plugin
        run: |
          PKG=android/app/src/main/java/leshugan/a4pda
          mkdir -p "$PKG" android/app/src/main/res/xml
          cp native/AppsPlugin.java "$PKG/AppsPlugin.java"
          cp native/MainActivity.java "$PKG/MainActivity.java"
          cp native/WebViewActivity.java "$PKG/WebViewActivity.java"
          cp native/*.kt "$PKG/" 2>/dev/null || echo "WARN: no .kt files in native/ (нужен свежий Project_4PDApps.zip)"
          # пути FileProvider (для установки apk из «Загрузок») — весь внешний storage
          printf '%s\n' '<paths>' '  <external-path name="ext" path="." />' '  <external-files-path name="extfiles" path="." />' '  <cache-path name="cache" path="." />' '  <files-path name="files" path="." />' '</paths>' > android/app/src/main/res/xml/file_paths.xml
          echo "native files:" && ls -la "$PKG"

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build signed release APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --build-cache \
            -Pandroid.injected.signing.store.file="$GITHUB_WORKSPACE/uc.jks" \
            -Pandroid.injected.signing.store.password="updatechecker" \
            -Pandroid.injected.signing.key.alias="uc" \
            -Pandroid.injected.signing.key.password="updatechecker"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: 4PDApps_APK
          path: android/app/build/outputs/apk/release/*.apk

  cleanup:
    needs: build
    if: success()
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Delete old runs and APKs (keep last 10 successful)
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          WF=build.yml
          echo "Оставляем 10 последних успешных запусков:"
          KEEP=$(gh run list --repo "$REPO" --workflow "$WF" --status success --limit 10 --json databaseId --jq '.[].databaseId')
          echo "$KEEP"
          echo "Удаляем остальные запуски и их APK:"
          gh run list --repo "$REPO" --workflow "$WF" --limit 300 --json databaseId --jq '.[].databaseId' | while read -r id; do
            [ "$id" = "$GITHUB_RUN_ID" ] && continue
            if ! printf '%s\n' "$KEEP" | grep -qx "$id"; then
              gh api -X DELETE "repos/$REPO/actions/runs/$id" >/dev/null 2>&1 && echo "удалён $id" || true
            fi
          done
